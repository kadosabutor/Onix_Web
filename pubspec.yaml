name: onix_web
description: "Onix Web SaaS Portal - Internal App"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # --- Core & Firebase ---
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4

  # --- Web & Routing ---
  go_router: ^17.1.0
  url_launcher: ^6.3.2

  # --- State Management & Utils ---
  provider: ^6.1.2 # Javaslom a verziószám fixálását (a tiednél üres volt)
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  flutter_localization: ^0.3.3
  image_picker: ^1.2.1 # Weben a fájlfeltöltő ablakot nyitja meg

  # --- SaaS UI & Design System ---
  lucide_icons_flutter: ^3.1.9
  google_fonts: ^8.0.2
  toastification: ^3.0.3 # Kiváló prémium webes értesítésekhez!
  lucide_icons: ^0.257.0
  flutter_expandable_fab: ^2.5.2
  slide_to_act: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true